<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account - Elevate Tech Co.</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="shortcut icon" href="../images/icon3.png" type="image/x-icon">
</head>
<body class="register-page">

    <header>

        <img class="img header-logo" src="../images/ideograma-png.png" alt="ideograma-png">

    </header>

    <div class="login-area">

        <div class="login-title">

            <img class="img login-logo" src="../images/icon3.png" alt="logo">

            <h1 class="lbl login">Sigin</h1>

        </div>
        
        <h3 class="lbl user">User</h3>
        <input class="input txt-user" type="text" id="user" placeholder="username" maxlength="18">

        <h3 class="lbl email">Email</h3>
        <input class="input txt-email" type="email" id="email" placeholder="exemple@gmail.com" maxlength="28">

        <h3 class="lbl pass">Password</h3>
        <input class="input txt-pass" type="password" id="pass" placeholder="your password" maxlength="18">
        
        <h3 class="lbl error" id="lbl-error"></h3>
        
        <button class="btn-login" id="btn-sigin">CREATE</button>

        <a class="lbl link" href="login.html" rel="noopener noreferrer">Alredy have a account</a>
    </div>
    </script><script type="module" src="../script/sigin.js"></script>
</body>
</html>
