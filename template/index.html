<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevate Technology Company</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/index.css">
    <link rel="shortcut icon" href="../images/icon3.png" type="image/x-icon">
</head>
<body>

    <header>

        <img class="img header-logo"  src="../images/ideograma-png.png" alt="ideograma-png">

        <div id="user-container">

            <h1 id="username">Loading User</h1>

            <img id="userIcon" class="default-user" src="../images/default-user.png" alt="profile image">

        </div>

    </header>

    <main class="home-container">

        <!-- HERO -->
        <section class="hero">
            <h1 class="hero-title">Sites que elevam o seu negócio</h1>
            <p class="hero-subtitle">
                Design moderno, alta performance e foco em conversão.
            </p>
        </section>

        <!-- MOSTRUÁRIO -->
        <section class="templates-section">

            <h2 class="section-title">Nossos Modelos</h2>

            <div class="templates-grid">

                <!-- TEMPLATE 1 -->
                <div class="template-card">
                    <img src="../images/template1.jpg" alt="template">
                    <div class="template-info">
                        <h3>Site Empresarial</h3>
                        <p>Ideal para empresas e serviços</p>
                        <button>Visualizar</button>
                    </div>
                </div>

                <!-- TEMPLATE 2 -->
                <div class="template-card">
                    <img src="../images/template2.jpg" alt="template">
                    <div class="template-info">
                        <h3>Landing Page</h3>
                        <p>Alta conversão para vendas</p>
                        <button>Visualizar</button>
                    </div>
                </div>

                <!-- TEMPLATE 3 -->
                <div class="template-card">
                    <img src="../images/template3.jpg" alt="template">
                    <div class="template-info">
                        <h3>Portfólio</h3>
                        <p>Perfeito para profissionais</p>
                        <button>Visualizar</button>
                    </div>
                </div>

            </div>

        </section>

    </main>

    <script type="module" src="../script/index.js"></script>
</body>
</html>
